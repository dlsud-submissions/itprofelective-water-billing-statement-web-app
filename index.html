<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Billing Statement</title>
    <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
    <head>
        <h1 class="header-text">Water Billing Statement</h1>
    </head>

    <main>
        <form action="YOUR_WEB_APP_URL" method="post" class="statement-form">
            <div class="form-row">
                <label for="customer-name">Customer Name:</label>
                <input type="text" name="customer-name-input" placeholder="Harvey Rullan" id="customer-name-input">
                <span class="error-span" id="customer-name-error"></span>
            </div>

            <div class="form-row">
                <label for="water-consumption">Water Consumption (Cubic Meter):</label>
                <input type="number" name="water-consumption-input" placeholder="100">
                <span class="error-span" id="water-consumption-error"></span>
            </div>

            <div class="form-row">
                <label for="customer-type">Customer Type:</label>
                <select name="customer-type" id="customer-type-select">
                    <option value="regular">Regular</option>
                    <option value="senior-citizen">Senior Citizen</option>
                    <option value="solo-parent">Solo Parent</option>
                </select>
            </div>

            <div class="form-row">
                <button type="submit" id="submit-btn">Generate Bill</button>
                <button type="reset" id="reset-btn">Clear Input</button>
            </div>

            <div class="form-row">
                <p class="body-text">Transactions Processed: 
                    <span id="transaction-count">0</span>
                </p>
                
                <div class="output-box"></div>
            </div>
        </form>
    </main>

    <footer>
        <p class="body-text">All Rights Reserved - DLSU-D Submissions - 2026</p>
    </footer>

    <script src="./src/script.js"></script>
</body>
</html>
